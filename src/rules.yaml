
rules:
  - id: python-sqli
    patterns:
      - pattern: $DB.execute(..., $INPUT, ...)
      - pattern-not: $DB.execute("...", ...)
    message: "Potential SQL Injection detected. Avoid building queries with string concatenation."
    languages: [python]
    severity: ERROR

  - id: python-pickle
    pattern: pickle.loads(...)
    message: "Unsafe deserialization detected. pickle.loads() can execute arbitrary code."
    languages: [python]
    severity: ERROR

  - id: python-command-injection
    pattern: subprocess.Popen(..., shell=True)
    message: "Command Injection risk. Avoid using shell=True with subprocess."
    languages: [python]
    severity: ERROR

  - id: python-weak-hash
    pattern: hashlib.md5(...)
    message: "Weak hashing algorithm (MD5) detected. Use SHA256 or stronger."
    languages: [python]
    severity: WARNING

  - id: python-hardcoded-aws-key
    pattern-regex: 'AKIA[0-9A-Z]{16}'
    message: "Hardcoded AWS Access Key detected."
    languages: [python]
    severity: ERROR

  # JavaScript Rules
  - id: js-weak-hash
    pattern: crypto.createHash('md5')
    message: "Weak hashing algorithm (MD5) detected."
    languages: [javascript]
    severity: WARNING
  
  - id: js-path-exposure
    pattern-regex: '__dirname\s*\+'
    message: "Potential Path Traversal/Information Disclosure."
    languages: [javascript]
    severity: WARNING

  # Java Rules
  - id: java-sqli
    pattern-regex: 'executeQuery\s*\(\s*".*"\s*\+'
    message: "Potential SQL Injection (String Concatenation)."
    languages: [java]
    severity: ERROR

  # C Rules
  - id: c-buffer-overflow-strcpy
    pattern: strcpy(...)
    message: "Potential Buffer Overflow. Use strncpy instead."
    languages: [c]
    severity: ERROR

  - id: c-command-injection
    pattern: system(...)
    message: "Command Injection Risk."
    languages: [c]
    severity: ERROR

  - id: c-gets-usage
    pattern: gets(...)
    message: "Critical: 'gets' is unsafe and can cause buffer overflows. Use 'fgets'."
    languages: [c]
    severity: ERROR


